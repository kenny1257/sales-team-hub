<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal America - Media Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="accent-bar"></div>
            <div class="login-content">
                <div class="login-logo-mark">MA</div>
                <h1 class="login-title">Media Library</h1>
                <p class="login-subtitle">Metal America</p>
                <div class="login-divider"></div>
                <p class="login-hint">Sign in with your company Google account</p>
                <div class="signin-container">
                    <div id="g_id_onload"></div>
                    <div id="signin-btn"></div>
                    <p class="auth-error" id="auth-error" style="display:none;"></p>
                    <p class="auth-loading" id="auth-loading">Loading sign-in...</p>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
